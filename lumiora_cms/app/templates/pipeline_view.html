{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
    <h2>Daily Sales Summary</h2>
    <table class="table">
        <thead>
            <tr><th>Date</th><th>Total Sales</th></tr>
        </thead>
        <tbody>
            {% for row in reports %}
            <tr>
                <td>{{ row.order_date }}</td>
                <td>${{ row.total_sales }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
