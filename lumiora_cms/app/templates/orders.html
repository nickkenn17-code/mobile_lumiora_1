<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Display - Lumiora</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f6f8; }
        .tab-section { margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 5px; }
        .tab-content { display: none; background: white; padding: 20px; border: 1px solid #ccc; }
        .active { display: block; }
        .order-card { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Lumiora Operations</h2>

    <div class="tab-section">
        <button onclick="showTab('coffee')">Coffee Bar</button>
        <button onclick="showTab('pastry')">Pastry</button>
        <button onclick="showTab('kitchen')">Hot Kitchen</button>
    </div>

    <div id="coffee" class="tab-content active">
        <h3>Coffee Bar</h3>
        <div class="order-card">
            <strong>Order #104</strong> <br>
            2x Iced Caramel Macchiato <br>
            <button style="margin-top: 10px;">Mark Complete</button>
        </div>
    </div>

    <div id="pastry" class="tab-content">
        <h3>Pastry</h3>
        <p>No active orders.</p>
    </div>

    <div id="kitchen" class="tab-content">
        <h3>Hot Kitchen</h3>
        <p>No active orders.</p>
    </div>

    <script>
        function showTab(tabId) {
            // Hide all tabs
            var tabs = document.getElementsByClassName('tab-content');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            // Show the clicked tab
            document.getElementById(tabId).classList.add('active');
        }
    </script>

</body>
</html>
