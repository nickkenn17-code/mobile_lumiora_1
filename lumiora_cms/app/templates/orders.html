<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Display - Lumiora</title>
    <style>
        /* Warna background dan font dasar */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background-color: #f8f9f5; 
            color: #333;
        }

        .tab-section { 
            margin-bottom: 20px; 
        }

        /* Tombol tab di bagian atas */
        .tab-section button { 
            background-color: white;
            color: #333;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            margin-right: 10px; 
            transition: all 0.2s;
        }

        .tab-section button:hover {
            background-color: #f0f0f0;
        }

        /* Kotak konten utama */
        .tab-content { 
            display: none; 
            background: white; 
            padding: 25px; 
            border: none; 
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .active { 
            display: block; 
        }

        /* Pemisah antar pesanan */
        .order-card { 
            border-bottom: 1px solid #f0f0f0; 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
            line-height: 1.5;
        }

        .order-card:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        /* Tombol Mark Complete (Sage Green) */
        .btn-complete {
            background-color: #7e8e73;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-complete:hover {
            background-color: #6a7a60;
        }
    </style>
</head>
<body>

    <h2>Lumiora Operations</h2>

    <div class="tab-section">
        <button onclick="showTab('coffee')">Coffee Bar</button>
        <button onclick="showTab('pastry')">Pastry</button>
        <button onclick="showTab('kitchen')">Hot Kitchen</button>
    </div>

    <div id="coffee" class="tab-content active">
        <h3>Coffee Bar</h3>
        <div class="order-card">
            <strong>Order #104</strong> <br>
            2x Iced Caramel Macchiato <br>
            <button class="btn-complete" onclick="selesaikanPesanan(this)">Mark Complete</button>
        </div>
    </div>

    <div id="pastry" class="tab-content">
        <h3>Pastry</h3>
        <p>No active orders.</p>
    </div>

    <div id="kitchen" class="tab-content">
        <h3>Hot Kitchen</h3>
        <p>No active orders.</p>
    </div>

    <script>
        function showTab(tabId) {
            // Sembunyikan semua tab
            var tabs = document.getElementsByClassName('tab-content');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            // Tampilkan tab yang diklik
            document.getElementById(tabId).classList.add('active');
        }

        function selesaikanPesanan(elemenTombol) {
            // Cari kotak pesanan (order-card) yang membungkus tombol ini
            var kotakPesanan = elemenTombol.closest('.order-card');
            
            // Sembunyikan kotaknya dari layar
            kotakPesanan.style.display = 'none';
        }
    </script>

</body>
</html>
