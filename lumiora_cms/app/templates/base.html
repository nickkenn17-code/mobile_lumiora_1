<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiora Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Shrikhand&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage-green: #7A8B70;
            --olive-dark: #4A5343;
            --cream-bg: #F5F6F1;
            --espresso: #3A2E28;
            --surface: #FFFFFF;
        }
        body { 
            background-color: var(--cream-bg); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--espresso);
        }
        .navbar { 
            background-color: var(--surface); 
            border-bottom: 2px solid var(--sage-green);
        }
        .brand-text {
            font-family: 'league-spartan',;
            color: var(--sage-green);
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .nav-link { 
            color: var(--olive-dark) !important; 
            font-weight: 600;
        }
        .nav-link:hover {
            color: var(--sage-green) !important;
        }
        .card {
            border: none;
            border-radius: 16px;
            background: var(--surface);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.06);
        }
        .btn-primary-lumiora { 
            background-color: var(--sage-green); 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-weight: 700;
            padding: 10px 20px;
        }
        .btn-primary-lumiora:hover { 
            background-color: var(--olive-dark); 
            color: white; 
        }
        .btn-outline-lumiora {
            border: 2px solid var(--sage-green);
            color: var(--sage-green);
            background: transparent;
            border-radius: 8px;
            font-weight: 700;
        }
        .btn-outline-lumiora:hover {
            background: var(--sage-green);
            color: white;
        }
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-5 p-3">
        <div class="container">
            <a class="navbar-brand brand-text" href="/cms/">Lumiora</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/kitchen/" target="_blank">Kitchen Display</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/" target="_blank">Database Panel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
